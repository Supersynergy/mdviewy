name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Node setup
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc

      - name: Rust setup
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev librsvg2-dev libxcb-shape0-dev libxcb-xfixes0-dev libsoup-3.0 javascriptcoregtk-4.1 webkit2gtk-4.1

      - name: Install JavaScript dependencies
        run: |
          corepack enable
          yarn install --immutable
          yarn setup

      - name: Frontend tests
        run: yarn workspace @mdviewy/desktop test

      - name: Frontend production build
        run: yarn build

      - name: Translation integrity
        run: node scripts/translate-check.js

      - name: Release script syntax
        run: bash -n scripts/prepare-macos-prerelease.sh

      - name: Rust formatting
        run: cargo fmt --all -- --check

      - name: Rust check
        run: cargo check --workspace --all-targets --all-features

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --workspace
