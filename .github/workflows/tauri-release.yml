name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux
            os: ubuntu-24.04
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - build: macos
            os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
          - build: macos
            os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
          - build: windows
            os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Node setup
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev patchelf libgtk-3-dev librsvg2-dev libxcb-shape0-dev libxcb-xfixes0-dev libsoup-3.0 javascriptcoregtk-4.1 webkit2gtk-4.1 pkg-config libfreetype6-dev libfontconfig1-dev

      - name: Write env file
        run: |
          echo VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}  >> ./apps/desktop/.env

      - name: Rust setup
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Setup
        run: yarn setup

      - name: Build workspaces
        run: yarn build

      - name: Install rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build the app
        env:
          RUSTC_WRAPPER: ""
        run: yarn build:desktop --target ${{ matrix.target }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.os == 'ubuntu-24.04'
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            ./target/${{ matrix.target }}/release/bundle/appimage/**.AppImage.*
            ./target/${{ matrix.target }}/release/bundle/appimage/**.AppImage
            ./target/${{ matrix.target }}/release/bundle/deb/**.deb
            ./target/${{ matrix.target }}/release/bundle/rpm/**.rpm

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.os == 'macos-latest' && matrix.arch == 'aarch64'
        with:
          name: aarch64artifacts-${{ matrix.target }}
          path: |
            ./target/${{ matrix.target }}/release/bundle/dmg/**.dmg
            ./target/${{ matrix.target }}/release/bundle/macos/**.app.*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.os == 'macos-latest' && matrix.arch == 'x86_64'
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            ./target/${{ matrix.target }}/release/bundle/dmg/**.dmg
            ./target/${{ matrix.target }}/release/bundle/macos/**.app.*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.os == 'windows-latest'
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            ./target/${{ matrix.target }}/release/bundle/msi/**
            ./target/${{ matrix.target }}/release/bundle/nsis/**

  build-offline-installer:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: windows-offline-installer
            os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Write env file
        run: |
          echo VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}  >> ./apps/desktop/.env

      - name: Node setup
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc

      - name: Rust setup
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Setup
        run: yarn setup

      - name: Use offline bundle
        if: matrix.os == 'windows-latest'
        run: yarn use-offline-bundle

      - name: Build workspaces
        run: yarn build

      - name: Install rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build the app
        env:
          RUSTC_WRAPPER: ""
        run: yarn build:desktop --target ${{ matrix.target }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.os == 'windows-latest'
        with:
          name: offline-installer-artifacts-${{ matrix.target }}
          path: |
            ./target/${{ matrix.target }}/release/bundle/msi/**
            ./target/${{ matrix.target }}/release/bundle/nsis/**

  release:
    permissions:
      contents: write
    needs: [build, build-offline-installer]
    runs-on: ubuntu-24.04
    steps:
      - name: Query version number
        run: |
          echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: artifacts/x86_64
          merge-multiple: true

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: aarch64artifacts-*
          path: artifacts/aarch64
          merge-multiple: true

      - name: Download offline installer artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: offline-installer-artifacts-*
          path: artifacts/offline-installer
          merge-multiple: true

      - name: Prepare release assets
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          mkdir -p release-assets

          copied=0
          copy_asset() {
            local source="$1"
            local target="$2"
            cp "$source" "release-assets/$target"
            copied=$((copied + 1))
          }

          for file in artifacts/x86_64/**/* artifacts/aarch64/**/*; do
            [ -f "$file" ] || continue
            case "$file" in
              *.dmg|*.deb|*.rpm|*.AppImage|*.msi|*.exe|*.tar.gz|*.sig)
                copy_asset "$file" "$(basename "$file")"
                ;;
            esac
          done

          for file in artifacts/offline-installer/**/*; do
            [ -f "$file" ] || continue
            case "$file" in
              *.msi|*.exe|*.sig)
                name="$(basename "$file")"
                copy_asset "$file" "${name/mdviewy_/mdviewy_offline_}"
                ;;
            esac
          done

          if [ "$copied" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          ls -lah release-assets

      - run: |
          tee release.txt >/dev/null << 'EOF'
          # mdviewy ${{ env.release_tag }}

          Calm, fast, local-first Markdown workspace for Windows, macOS, and Linux.

          ## Highlights

          - Lean startup with no automatic home-folder indexing.
          - Fixed blank-window paths and added recoverable UI failures.
          - Atomic file saves and bounded workspace loading.
          - GitHub-style README preview with safe links, HTML, tables, tasks, alerts, and relative assets.
          - Adaptive focus layout, Smart Actions, and Print / Save as PDF.

          ## Windows 11

          - Recommended: download `mdviewy_*_x64-setup.exe`.
          - Offline/no-WebView2 machines: download `mdviewy_offline_*_x64-setup.exe`.
          - MSI packages are included for managed installs.
          - Unsigned builds may show Microsoft SmartScreen until Windows code signing is configured.

          <details>

          <summary>FAQ</summary>

          ### Windows

          The normal installer downloads WebView2 when Windows does not already have it. The offline installer bundles WebView2 and is larger.

          ### macOS

          These prerelease builds are not notarized yet. If macOS blocks first launch, open System Settings > Privacy & Security and allow the app, or run:

          ```bash
          xattr -cr /Applications/mdviewy.app
          ```

          </details>

          EOF

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.release_tag }}
          name: ${{ env.release_tag }}
          body_path: release.txt
          draft: false
          prerelease: true
          files: ./release-assets/*
          fail_on_unmatched_files: true
